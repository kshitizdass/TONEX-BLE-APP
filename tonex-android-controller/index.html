<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#141311">
    <title>TONEX ONE BLE Controller</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="assets/icon.svg" alt="" class="brand-mark">
          <div>
            <p class="eyebrow">Builty TonexOneController</p>
            <h1>TONEX ONE Controller</h1>
          </div>
        </div>
        <div class="status-block">
          <span id="statusDot" class="status-dot" aria-hidden="true"></span>
          <span id="statusText">Offline</span>
        </div>
      </header>

      <section class="connection-panel" aria-labelledby="connectHeading">
        <div>
          <h2 id="connectHeading">Link</h2>
          <p id="deviceName" class="device-name">No board selected</p>
        </div>
        <div class="connect-actions">
          <button id="connectButton" class="primary-button" type="button">Connect</button>
          <button id="disconnectButton" class="plain-button" type="button" disabled>Disconnect</button>
        </div>
      </section>

      <section class="preset-panel" aria-labelledby="presetHeading">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Program Change</p>
            <h2 id="presetHeading">Presets</h2>
          </div>
          <div class="active-readout">
            <span>Active</span>
            <strong id="activePreset">01</strong>
          </div>
        </div>

        <div class="bank-row" aria-label="Bank controls">
          <button id="bankDownButton" class="tool-button" type="button">Bank -</button>
          <label class="compact-field">
            <span>Bank</span>
            <input id="bankInput" type="number" min="1" max="10" step="1" value="1">
          </label>
          <button id="bankUpButton" class="tool-button" type="button">Bank +</button>
        </div>

        <div id="presetGrid" class="preset-grid" aria-label="Preset buttons"></div>
      </section>

      <section class="controls-panel" aria-labelledby="controlHeading">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Live</p>
            <h2 id="controlHeading">Controls</h2>
          </div>
          <div class="channel-pill">
            Ch <span id="channelReadout">1</span>
          </div>
        </div>

        <div class="segment-row" aria-label="TONEX slot controls">
          <button class="segment-button" data-command-key="slotA" type="button">Load A</button>
          <button class="segment-button" data-command-key="slotB" type="button">Load B</button>
          <button class="segment-button" data-command-key="slotBankUp" type="button">AB +</button>
        </div>

        <div class="quick-grid">
          <button class="action-button danger" data-command-key="bypass" type="button">Bypass</button>
          <button class="action-button amber" data-command-key="reverb" type="button">Reverb</button>
          <button class="action-button cyan" data-command-key="tap" type="button">Tap</button>
          <button class="action-button green" data-command-key="cab" type="button">Cab</button>
        </div>
      </section>

      <section class="parameter-panel" aria-labelledby="parameterHeading">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Continuous CC</p>
            <h2 id="parameterHeading">Parameters</h2>
          </div>
          <button id="panicButton" class="plain-button" type="button">FX Off</button>
        </div>

        <div id="sliderGrid" class="slider-grid"></div>
      </section>

      <section class="custom-panel" aria-labelledby="customHeading">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Saved Commands</p>
            <h2 id="customHeading">Pads</h2>
          </div>
          <button id="editPadsButton" class="plain-button" type="button">Edit</button>
        </div>

        <div id="customPads" class="custom-grid"></div>
      </section>

      <details class="settings-panel">
        <summary>Bridge settings</summary>

        <div class="settings-grid">
          <label class="field">
            <span>BLE profile</span>
            <select id="profileSelect">
              <option value="midi">TonexController BLE-MIDI</option>
              <option value="uart">Legacy UART bridge</option>
            </select>
          </label>
          <label class="field">
            <span>MIDI channel</span>
            <input id="midiChannelInput" type="number" min="1" max="16" step="1">
          </label>
          <label class="field span-2">
            <span>Service UUID</span>
            <input id="serviceUuidInput" type="text" spellcheck="false">
          </label>
          <label class="field span-2">
            <span>Write characteristic</span>
            <input id="writeUuidInput" type="text" spellcheck="false">
          </label>
          <label class="field span-2">
            <span>Notify characteristic</span>
            <input id="notifyUuidInput" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>Line ending</span>
            <select id="lineEndingSelect">
              <option value="lf">LF</option>
              <option value="crlf">CRLF</option>
              <option value="none">None</option>
            </select>
          </label>
        </div>

        <div class="template-grid" aria-label="Command templates">
          <label class="field">
            <span>Preset</span>
            <input data-template-key="preset" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>CC</span>
            <input data-template-key="cc" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>Bypass</span>
            <input data-template-key="bypass" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>Reverb</span>
            <input data-template-key="reverb" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>Tap</span>
            <input data-template-key="tap" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>Cab</span>
            <input data-template-key="cab" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>Slot A</span>
            <input data-template-key="slotA" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>Slot B</span>
            <input data-template-key="slotB" type="text" spellcheck="false">
          </label>
          <label class="field">
            <span>AB Bank +</span>
            <input data-template-key="slotBankUp" type="text" spellcheck="false">
          </label>
        </div>

        <div class="settings-actions">
          <button id="saveSettingsButton" class="primary-button" type="button">Save</button>
          <button id="resetSettingsButton" class="plain-button" type="button">Reset</button>
        </div>
      </details>

      <section class="console-panel" aria-labelledby="consoleHeading">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Traffic</p>
            <h2 id="consoleHeading">Console</h2>
          </div>
          <button id="clearLogButton" class="plain-button" type="button">Clear</button>
        </div>
        <form id="rawForm" class="raw-form">
          <input id="rawInput" type="text" autocomplete="off" spellcheck="false" placeholder="Raw command">
          <button class="tool-button" type="submit">Send</button>
        </form>
        <ol id="logList" class="log-list" aria-live="polite"></ol>
      </section>
    </main>

    <dialog id="padDialog" class="pad-dialog">
      <form method="dialog" id="padForm">
        <h2>Edit Pads</h2>
        <div id="padEditor" class="pad-editor"></div>
        <menu>
          <button class="plain-button" value="cancel" type="submit">Cancel</button>
          <button id="savePadsButton" class="primary-button" value="default" type="submit">Save</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
